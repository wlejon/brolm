name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# brolm resolves its siblings from ../<name>, so every job reconstructs that
# layout in the runner workspace before configuring:
#
#     $GITHUB_WORKSPACE/
#       brolm/      <- this repo, in a named path, not the workspace root
#       bromath/
#       brotensor/
#       broimage/
#
# Hence `path:` on every checkout and `cmake -S brolm`. A default checkout puts
# ../bromath outside the workspace and the configure dies on the FATAL_ERROR in
# CMakeLists. Siblings track main, which is how the stack is developed — so a
# breaking change landing in brotensor or broimage fails here, rather than in
# whoever next builds brolm by hand.
#
# The build is the whole stack below brolm (brotensor's CPU backend, broimage,
# stb) plus brolm itself, its 45 test binaries and its tool drivers. That is
# what ccache is for on the Linux and macOS jobs: a push that does not touch a
# sibling gets those TUs back for free.
#
# What ctest actually covers here: weights/ is 86 GB and gitignored, so a runner
# never has it. The model tests gate on getenv/fs::exists and print [skip]; the
# rest build their fixtures synthetically in temp_directory_path() and run for
# real. So a green run means "brolm compiles everywhere and its self-contained
# tests pass" — it does not mean the models produce correct output. That check
# needs the weights and stays on hardware that has them.
jobs:
  test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: linux-gcc,    os: ubuntu-24.04, cc: gcc,   cxx: g++ }
          - { name: linux-clang,  os: ubuntu-24.04, cc: clang, cxx: clang++ }
          - { name: windows-msvc, os: windows-2022 }
          - { name: macos-arm64,  os: macos-14 }
    steps:
      - uses: actions/checkout@v5
        with:
          path: brolm

      - uses: actions/checkout@v5
        with:
          repository: wlejon/bromath
          path: bromath

      - uses: actions/checkout@v5
        with:
          repository: wlejon/brotensor
          path: brotensor

      - uses: actions/checkout@v5
        with:
          repository: wlejon/broimage
          path: broimage

      - name: Install Ninja (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends ninja-build

      - name: Install Ninja (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja

      - name: ccache
        if: runner.os != 'Windows'
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: brolm-${{ matrix.name }}
          max-size: 500M

      - name: Configure
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            cmake -S brolm -B build -DCMAKE_BUILD_TYPE=Release
          else
            cmake -S brolm -B build -G Ninja \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          fi
        shell: bash

      - name: Build
        run: cmake --build build --config Release --parallel 4

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure

  # ── Coverage ──────────────────────────────────────────────────────────────
  #
  # Scoped to brolm's own src/ and include/. The siblings are measured by their
  # own coverage jobs; counting them here would report brolm's number against
  # code brolm's tests were never meant to cover.
  #
  # No ccache: it interacts badly with --coverage, because the .gcno sidecars
  # are compile-time artifacts and a cache hit skips emitting them.
  coverage:
    name: Coverage
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          path: brolm

      - uses: actions/checkout@v5
        with:
          repository: wlejon/bromath
          path: bromath

      - uses: actions/checkout@v5
        with:
          repository: wlejon/brotensor
          path: brotensor

      - uses: actions/checkout@v5
        with:
          repository: wlejon/broimage
          path: broimage

      - name: Install gcovr + Ninja
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends gcovr ninja-build

      - name: Configure (instrumented)
        run: |
          cmake -S brolm -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBROLM_COVERAGE=ON

      - name: Build
        run: cmake --build build --parallel 4

      - name: Test
        run: ctest --test-dir build --output-on-failure

      # pipefail: piping gcovr into tee otherwise hands the step tee's exit
      # status, so a gcovr crash produces no report and the job still goes green.
      - name: Report
        shell: bash
        working-directory: brolm
        run: |
          set -o pipefail
          mkdir -p coverage-html
          gcovr --root . \
            --filter 'src/' --filter 'include/brolm/' \
            --exclude 'tests/' --exclude 'tools/' \
            --exclude-unreachable-branches \
            --gcov-ignore-parse-errors negative_hits.warn_once_per_file \
            --print-summary \
            --html-details coverage-html/index.html \
            | tee coverage-summary.txt
          test -s coverage-html/index.html

      - name: Job summary
        if: always()
        working-directory: brolm
        run: |
          {
            echo '## Coverage — `src/` + `include/brolm/`'
            echo
            echo 'The model tests skip without `weights/` (86 GB, gitignored), so this'
            echo 'measures the self-contained tests only — the tokenizers, configs,'
            echo 'samplers, and the loaders driven by synthetic safetensors fixtures.'
            echo 'It understates the loading and generation paths accordingly.'
            echo
            echo '```'
            cat coverage-summary.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: brolm/coverage-html/
          retention-days: 14
